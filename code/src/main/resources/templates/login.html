<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{title.login}">用户登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/mobile-responsive.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-container">
            <h2 class="text-center mb-4" th:text="#{title.login}">用户登录</h2>
            <div th:if="${param.logout}" class="alert alert-success" th:text="#{msg.success.logout}"></div>
            <div th:if="${param.error}" class="alert alert-danger" th:text="#{msg.error.login.failed}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <form th:action="@{/login}" method="post">
                <div class="form-group mb-3">
                    <label for="username" th:text="#{label.username}">用户名</label>
                    <input type="text" id="username" name="username" class="form-control" required>
                </div>
                <div class="form-group mb-3">
                    <label for="password" th:text="#{label.password}">密码</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                <div class="form-group mb-3">
                    <div class="form-check">
                        <input type="checkbox" id="remember-me" name="remember-me" class="form-check-input">
                        <label for="remember-me" class="form-check-label" th:text="#{label.remember.me}">记住我</label>
                    </div>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary" th:text="#{btn.submit}">登录</button>
                </div>
            </form>
            <div class="text-center mt-3">
                <a href="/user/register" th:text="#{label.no.account}">没有账号？注册</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
