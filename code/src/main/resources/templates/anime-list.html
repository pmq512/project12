<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{title.anime.list}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/mobile-responsive.css">
    <style>
        .anime-card {
            margin-bottom: 20px;
            transition: transform 0.3s;
        }
        .anime-card:hover {
            transform: translateY(-5px);
        }
        .anime-cover {
            height: 300px;
            object-fit: cover;
        }
        .section-title {
            margin-top: 40px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #4CAF50;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/anime/" th:text="#{title.home}">动漫流媒体</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item active">
                        <a class="nav-link" href="/anime/" th:text="#{nav.home}">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/category/" th:text="#{nav.category}">分类管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/community">社区</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/recommend" th:text="#{nav.recommend}">为你推荐</a>
                    </li>
                    <li class="nav-item" th:if="${isLoggedIn}">
                        <a class="nav-link" href="/favorite/list" th:text="#{nav.favorite}">我的收藏</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <div th:if="${isLoggedIn}">
                        <li class="nav-item">
                            <span class="nav-link text-light" th:text="#{user.welcome} + '，' + ${currentUser?.username} + '！'">欢迎，用户！</span>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/user/profile" th:text="#{nav.profile}">个人资料</a>
                        </li>
                        <li th:if="${currentUser?.role == 'ADMIN'}" class="nav-item">
                            <a class="nav-link" href="/admin/" th:text="#{nav.admin}">后台管理</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/social/notifications" th:text="#{nav.notifications}">通知</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/social/search?keyword=" th:text="#{nav.search.users}">搜索用户</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/logout" th:text="#{nav.logout}">退出登录</a>
                        </li>
                    </div>
                    <div th:if="${!isLoggedIn}">
                        <li class="nav-item">
                            <a class="nav-link" href="/login" th:text="#{nav.login}">登录</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/user/register" th:text="#{nav.register}">注册</a>
                        </li>
                    </div>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <span th:text="#{nav.lang}">语言</span>
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="?lang=zh_CN">中文</a></li>
                            <li><a class="dropdown-item" href="?lang=en">English</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        <!-- 搜索和筛选 -->
        <div class="mb-4">
            <form th:action="@{/anime/}" method="get" class="form-inline d-flex flex-wrap gap-2">
                <div class="form-group flex-grow-1">
                    <input type="text" id="keyword" name="keyword" 
                           class="form-control w-100" th:placeholder="#{label.search}"
                           th:value="${keyword}">
                </div>
                <div class="form-group">
                    <select id="category" name="categoryId" class="form-control">
                        <option value="" th:text="#{label.category}">全部分类</option>
                        <option th:each="category : ${categories}" 
                                th:value="${category.id}"
                                th:selected="${selectedCategoryId != null && selectedCategoryId == category.id}"
                                th:text="${category.name}"></option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" th:text="#{btn.search}">搜索</button>
            </form>
        </div>
        
        <a href="/anime/add" class="btn btn-primary mb-4" th:text="#{btn.add}">添加动漫</a>
        
        <!-- 推荐区域 -->
        <h2 class="section-title" th:text="#{title.recommend}">为你推荐</h2>
        <div class="row">
            <div th:each="anime : ${recommendations}" class="col-md-4">
                <div class="card anime-card">
                    <img th:src="${anime.coverImage}" th:alt="${anime.title}" class="card-img-top anime-cover">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${anime.title}"></h5>
                        <p class="card-text" th:text="${anime.description}"></p>
                        <p class="card-text text-muted" th:if="${anime.category != null}">
                            <span th:text="#{label.category}"></span>：<span th:text="${anime.category.name}"></span>
                        </p>
                        <a th:href="@{/anime/view/{id}(id=${anime.id})}" class="btn btn-success" th:text="#{btn.watch}">观看</a>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 全部动漫 -->
        <h2 class="section-title" th:text="#{title.anime.list}">全部动漫</h2>
        <div class="row">
            <div th:each="anime : ${animes}" class="col-md-4">
                <div class="card anime-card">
                    <img th:src="${anime.coverImage}" th:alt="${anime.title}" class="card-img-top anime-cover">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${anime.title}"></h5>
                        <p class="card-text" th:text="${anime.description}"></p>
                        <p class="card-text text-muted" th:if="${anime.category != null}">
                            <span th:text="#{label.category}"></span>：<span th:text="${anime.category.name}"></span>
                        </p>
                        <div class="d-flex justify-content-between">
                            <a th:href="@{/anime/view/{id}(id=${anime.id})}" class="btn btn-success" th:text="#{btn.watch}">观看</a>
                            <div>
                                <a th:href="@{/anime/edit/{id}(id=${anime.id})}" class="btn btn-warning" th:text="#{btn.edit}">编辑</a>
                                <a th:href="@{/anime/delete/{id}(id=${anime.id})}" class="btn btn-danger ml-2" th:text="#{btn.delete}">删除</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
