<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>动漫列表</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .anime-card {
            margin-bottom: 20px;
            transition: transform 0.3s;
        }
        .anime-card:hover {
            transform: translateY(-5px);
        }
        .anime-cover {
            height: 300px;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/anime/">动漫流媒体</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/anime/">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/category/">分类管理</a>
                    </li>
                    <li class="nav-item" th:if="${isLoggedIn}">
                        <a class="nav-link" href="/favorite/list">我的收藏</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <div th:if="${isLoggedIn}">
                        <li class="nav-item">
                            <span class="nav-link text-light">欢迎，<span th:text="${currentUser?.username}"></span>！</span>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/user/profile">个人资料</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/logout">退出登录</a>
                        </li>
                    </div>
                    <div th:if="${!isLoggedIn}">
                        <li class="nav-item">
                            <a class="nav-link" href="/login">登录</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/user/register">注册</a>
                        </li>
                    </div>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="mb-0">动漫列表</h1>
            <a href="/category/" class="btn btn-info">
                分类管理
            </a>
        </div>
        
        <!-- 搜索和筛选 -->
        <div class="mb-4">
            <form th:action="@{/anime/}" method="get" class="form-inline d-flex flex-wrap gap-2">
                <div class="form-group flex-grow-1">
                    <input type="text" id="keyword" name="keyword" 
                           class="form-control w-100" placeholder="搜索动漫标题或描述..."
                           th:value="${keyword}">
                </div>
                <div class="form-group">
                    <select id="category" name="categoryId" class="form-control">
                        <option value="">全部分类</option>
                        <option th:each="category : ${categories}" 
                                th:value="${category.id}"
                                th:selected="${selectedCategoryId != null && selectedCategoryId == category.id}"
                                th:text="${category.name}"></option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">搜索</button>
            </form>
        </div>
        
        <a href="/anime/add" class="btn btn-primary mb-4">添加动漫</a>
        
        <!-- 用户操作按钮 -->
        <div class="mb-4">
            <div th:if="${isLoggedIn}">
                <span class="text-muted">欢迎，<span th:text="${currentUser?.username}"></span>！</span>
                <a href="/logout" class="btn btn-warning">退出登录</a>
            </div>
            <div th:if="${!isLoggedIn}">
                <a href="/login" class="btn btn-success">登录</a>
                <a href="/user/register" class="btn btn-secondary">注册</a>
            </div>
        </div>
        
        <div class="row">
            <div th:each="anime : ${animes}" class="col-md-4">
                <div class="card anime-card">
                    <img th:src="${anime.coverImage}" th:alt="${anime.title}" class="card-img-top anime-cover">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${anime.title}"></h5>
                        <p class="card-text" th:text="${anime.description}"></p>
                        <p class="card-text text-muted" th:if="${anime.category != null}">
                            分类：<span th:text="${anime.category.name}"></span>
                        </p>
                        <div class="d-flex justify-content-between">
                            <a th:href="@{/anime/view/{id}(id=${anime.id})}" class="btn btn-success">观看</a>
                            <div>
                                <a th:href="@{/anime/edit/{id}(id=${anime.id})}" class="btn btn-warning">编辑</a>
                                <a th:href="@{/anime/delete/{id}(id=${anime.id})}" class="btn btn-danger ml-2">删除</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
