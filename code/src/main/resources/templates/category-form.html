<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>添加/编辑分类</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/anime/">动漫流媒体</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/anime/">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/category/">分类管理</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        <h1 th:if="${category.id == null}">添加分类</h1>
        <h1 th:if="${category.id != null}">编辑分类</h1>
        <form th:action="@{/category/save}" th:object="${category}" method="post" class="mt-4">
            <input type="hidden" th:field="*{id}">
            <div class="form-group">
                <label for="name">分类名称</label>
                <input type="text" id="name" th:field="*{name}" class="form-control" required>
            </div>
            <div class="form-group mt-3">
                <label for="description">分类描述</label>
                <textarea id="description" th:field="*{description}" class="form-control" rows="3"></textarea>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">保存</button>
                <a href="/category/" class="btn btn-secondary ml-2">取消</a>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
