<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{title.favorite}">我的收藏</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/mobile-responsive.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/anime/" th:text="#{title.home}">动漫流媒体</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/anime/" th:text="#{nav.home}">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/category/" th:text="#{nav.category}">分类管理</a>
                    </li>
                    <li class="nav-item active">
                        <a class="nav-link" href="/favorite/list" th:text="#{nav.favorite}">我的收藏</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/user/profile" th:text="#{nav.profile}">个人资料</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/logout" th:text="#{nav.logout}">退出登录</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <span th:text="#{nav.lang}">语言</span>
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="?lang=zh_CN">中文</a></li>
                            <li><a class="dropdown-item" href="?lang=en">English</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        <h1 th:text="#{nav.favorite}">我的收藏</h1>
        
        <div th:if="${favorites.isEmpty()}" class="alert alert-info">
            <p th:text="#{label.no.favorites}">您还没有收藏任何动漫</p>
        </div>
        
        <div th:unless="${favorites.isEmpty()}" class="row">
            <div th:each="favorite : ${favorites}" class="col-md-4 mb-4">
                <div class="card h-100">
                    <img th:src="${favorite.anime.coverImage}" th:alt="${favorite.anime.title}" 
                         class="card-img-top" height="200" object-fit="cover">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${favorite.anime.title}"></h5>
                        <p class="card-text" th:text="${favorite.anime.description}"></p>
                        <p class="text-muted"><span th:text="#{label.category}"></span>：<span th:text="${favorite.anime.category?.name}"></span></p>
                        <a th:href="@{/anime/view/{id}(id=${favorite.anime.id})}" class="btn btn-primary" th:text="#{btn.watch}">观看</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
