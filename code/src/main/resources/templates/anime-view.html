<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>观看动漫</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .comment {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
        }
        .comment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .comment-author {
            font-weight: bold;
        }
        .comment-time {
            color: #888;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/anime/">动漫流媒体</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/anime/">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/category/">分类管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/favorite/list">我的收藏</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <div th:if="${isLoggedIn}">
                        <li class="nav-item">
                            <span class="nav-link text-light">欢迎，<span th:text="${currentUser?.username}"></span>！</span>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/user/profile">个人资料</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/logout">退出登录</a>
                        </li>
                    </div>
                    <div th:if="${!isLoggedIn}">
                        <li class="nav-item">
                            <a class="nav-link" href="/login">登录</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/user/register">注册</a>
                        </li>
                    </div>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        <a href="/anime/" class="btn btn-secondary mb-4">返回列表</a>
        <div class="row">
            <div class="col-md-8">
                <h1 th:text="${anime.title}"></h1>
                <p class="text-muted" th:text="${anime.description}"></p>
                <p class="text-muted" th:if="${anime.category != null}">
                    分类：<span th:text="${anime.category.name}"></span>
                </p>
                
                <!-- 评分和收藏区域 -->
                <div class="mt-4">
                    <div class="d-flex justify-content-between align-items-center">
                        <!-- 评分显示 -->
                        <div>
                            <span class="text-lg">评分：</span>
                            <span class="text-2xl font-bold text-warning" th:text="${averageRating}"></span>
                            <span class="text-muted">/ 5.0</span>
                            <span class="text-muted ml-2" th:text="${ratingCount} + '人评分'"></span>
                        </div>
                        
                        <!-- 收藏按钮 -->
                        <form th:if="${!isFavorite}" th:action="@{/favorite/add/{animeId}(animeId=${anime.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-outline-danger">
                                <span>❤️</span> 收藏
                            </button>
                        </form>
                        <form th:if="${isFavorite}" th:action="@{/favorite/remove/{animeId}(animeId=${anime.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-danger">
                                <span>❤️</span> 已收藏
                            </button>
                        </form>
                    </div>
                    
                    <!-- 评分表单 -->
                    <div class="mt-4">
                        <form th:action="@{/rating/add/{animeId}(animeId=${anime.id})}" method="post">
                            <label class="mr-2">我来评分：</label>
                            <div class="btn-group" role="group">
                                <button type="submit" name="score" value="1" class="btn btn-outline-primary">1</button>
                                <button type="submit" name="score" value="2" class="btn btn-outline-primary">2</button>
                                <button type="submit" name="score" value="3" class="btn btn-outline-primary">3</button>
                                <button type="submit" name="score" value="4" class="btn btn-outline-primary">4</button>
                                <button type="submit" name="score" value="5" class="btn btn-outline-primary">5</button>
                            </div>
                        </form>
                    </div>
                </div>
                <div class="video-container mt-4">
                    <div th:if="${isEmbedUrl}">
                        <iframe th:src="${videoUrl}" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div th:unless="${isEmbedUrl}" class="text-center py-10 bg-gray-100 rounded-lg">
                        <p class="text-lg text-gray-600 mb-4">点击下方按钮跳转到视频网站观看</p>
                        <a th:href="${videoUrl}" target="_blank" class="btn btn-primary btn-lg">
                            <span class="glyphicon glyphicon-play"></span> 观看视频
                        </a>
                    </div>
                </div>
                
                <!-- 评论区 -->
                <div class="mt-6">
                    <h3>评论</h3>
                    
                    <!-- 评论表单 -->
                    <div th:if="${isLoggedIn}">
                        <div class="mb-4">
                            <form th:action="@{/anime/comment/{animeId}(animeId=${anime.id})}" method="post">
                                <div class="form-group">
                                    <label for="content">发表评论</label>
                                    <textarea id="content" name="content" class="form-control" rows="3" required></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary mt-2">发布评论</button>
                            </form>
                        </div>
                    </div>
                    <div th:if="${!isLoggedIn}">
                        <p>请 <a href="/login">登录</a> 后发表评论</p>
                    </div>
                    
                    <!-- 评论列表 -->
                    <div class="mt-4">
                        <div th:each="comment : ${comments}" class="comment">
                            <div class="comment-header">
                                <span class="comment-author" th:text="${comment.user.username}"></span>
                                <span class="comment-time" th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                            </div>
                            <div class="comment-content" th:text="${comment.content}"></div>
                        </div>
                        <div th:if="${comments.size() == 0}" class="text-muted">
                            暂无评论，快来发表第一条评论吧！
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <img th:src="${anime.coverImage}" th:alt="${anime.title}" class="img-fluid rounded">
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
