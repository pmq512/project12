<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{title.category}">分类管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/mobile-responsive.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/anime/" th:text="#{title.home}">动漫流媒体</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/anime/" th:text="#{nav.home}">首页</a>
                    </li>
                    <li class="nav-item active">
                        <a class="nav-link" href="/category/" th:text="#{nav.category}">分类管理</a>
                    </li>
                    <li class="nav-item" th:if="${isLoggedIn}">
                        <a class="nav-link" href="/favorite/list" th:text="#{nav.favorite}">我的收藏</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <div th:if="${isLoggedIn}">
                        <li class="nav-item">
                            <span class="nav-link text-light" th:text="#{user.welcome} + '，' + ${currentUser?.username} + '！'">欢迎，用户！</span>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/user/profile" th:text="#{nav.profile}">个人资料</a>
                        </li>
                        <li th:if="${currentUser?.role == 'ADMIN'}" class="nav-item">
                            <a class="nav-link" href="/admin/" th:text="#{nav.admin}">后台管理</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/logout" th:text="#{nav.logout}">退出登录</a>
                        </li>
                    </div>
                    <div th:if="${!isLoggedIn}">
                        <li class="nav-item">
                            <a class="nav-link" href="/login" th:text="#{nav.login}">登录</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/user/register" th:text="#{nav.register}">注册</a>
                        </li>
                    </div>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <span th:text="#{nav.lang}">语言</span>
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="?lang=zh_CN">中文</a></li>
                            <li><a class="dropdown-item" href="?lang=en">English</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="mb-0" th:text="#{title.category}">分类管理</h1>
            <div>
                <a href="/anime/" class="btn btn-secondary" th:text="#{btn.back}">返回主页</a>
            </div>
        </div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <a href="/category/add" class="btn btn-primary mb-4" th:text="#{btn.add}">添加分类</a>
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>ID</th>
                    <th th:text="#{label.name}">名称</th>
                    <th th:text="#{label.description}">描述</th>
                    <th th:text="#{label.action}">操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="category : ${categories}">
                    <td th:text="${category.id}"></td>
                    <td th:text="${category.name}"></td>
                    <td th:text="${category.description}"></td>
                    <td>
                        <a th:href="@{/category/edit/{id}(id=${category.id})}" class="btn btn-warning btn-sm" th:text="#{btn.edit}">编辑</a>
                        <a th:href="@{/category/delete/{id}(id=${category.id})}" class="btn btn-danger btn-sm ml-2" th:text="#{btn.delete}">删除</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
