<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>个人信息 - Luxury Stay</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .font-serif {
            font-family: 'Playfair Display', 'Noto Serif SC', Georgia, serif;
        }
        .font-sans {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
    </style>
</head>
<body>
<div th:fragment="content" class="font-sans">
    <!-- 个人信息卡片 -->
    <div class="data-table">
        <div class="data-table-header">
            <h5>
                <i class="bi bi-person-circle"></i>
                个人信息
            </h5>
        </div>
        
        <div style="padding: 30px;">
            <form th:action="@{/user/profile/update}" method="post">
                <div style="display: flex; gap: 40px;">
                    <!-- 头像区域 -->
                    <div style="text-align: center; width: 200px;">
                        <div class="user-avatar-lg" style="width: 140px; height: 140px; background: var(--gold-gradient); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 3.5rem; font-weight: 600; color: var(--bg-dark); box-shadow: var(--shadow-gold);">
                            <span th:text="${user != null ? user.username.substring(0,1).toUpperCase() : 'U'}">U</span>
                        </div>
                        <button type="button" class="btn-action btn-outline" style="width: 100%;">
                            <i class="bi bi-camera"></i>
                            更换头像
                        </button>
                    </div>
                    
                    <!-- 表单区域 -->
                    <div style="flex: 1;">
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 25px;">
                            <div>
                                <label style="font-weight: 600; color: var(--text-primary); margin-bottom: 10px; display: block;">用户名</label>
                                <input type="text" name="username" th:value="${user != null ? user.username : ''}" required
                                       style="width: 100%; padding: 12px 16px; border: 2px solid rgba(212, 175, 55, 0.2); border-radius: 12px; font-size: 0.95rem; transition: all 0.3s ease;">
                            </div>
                            <div>
                                <label style="font-weight: 600; color: var(--text-primary); margin-bottom: 10px; display: block;">邮箱</label>
                                <input type="email" name="email" th:value="${user != null ? user.email : ''}" required
                                       style="width: 100%; padding: 12px 16px; border: 2px solid rgba(212, 175, 55, 0.2); border-radius: 12px; font-size: 0.95rem; transition: all 0.3s ease;">
                            </div>
                            <div>
                                <label style="font-weight: 600; color: var(--text-primary); margin-bottom: 10px; display: block;">手机号</label>
                                <input type="tel" name="phone" th:value="${user != null ? user.phone : ''}"
                                       style="width: 100%; padding: 12px 16px; border: 2px solid rgba(212, 175, 55, 0.2); border-radius: 12px; font-size: 0.95rem; transition: all 0.3s ease;">
                            </div>
                            <div>
                                <label style="font-weight: 600; color: var(--text-primary); margin-bottom: 10px; display: block;">身份证号</label>
                                <input type="text" name="idCard" th:value="${user != null ? user.idCard : ''}"
                                       style="width: 100%; padding: 12px 16px; border: 2px solid rgba(212, 175, 55, 0.2); border-radius: 12px; font-size: 0.95rem; transition: all 0.3s ease;">
                            </div>
                            <div>
                                <label style="font-weight: 600; color: var(--text-primary); margin-bottom: 10px; display: block;">性别</label>
                                <select name="gender" style="width: 100%; padding: 12px 16px; border: 2px solid rgba(212, 175, 55, 0.2); border-radius: 12px; font-size: 0.95rem; transition: all 0.3s ease;">
                                    <option value="" th:selected="${user == null || user.gender == null}">请选择</option>
                                    <option value="MALE" th:selected="${user != null && user.gender == 'MALE'}">男</option>
                                    <option value="FEMALE" th:selected="${user != null && user.gender == 'FEMALE'}">女</option>
                                </select>
                            </div>
                            <div>
                                <label style="font-weight: 600; color: var(--text-primary); margin-bottom: 10px; display: block;">出生日期</label>
                                <input type="date" name="birthDate" th:value="${user != null && user.birthDate != null ? #dates.format(user.birthDate, 'yyyy-MM-dd') : ''}"
                                       style="width: 100%; padding: 12px 16px; border: 2px solid rgba(212, 175, 55, 0.2); border-radius: 12px; font-size: 0.95rem; transition: all 0.3s ease;">
                            </div>
                        </div>
                        
                        <div style="margin-bottom: 25px;">
                            <label style="font-weight: 600; color: var(--text-primary); margin-bottom: 10px; display: block;">地址</label>
                            <input type="text" name="address" th:value="${user != null ? user.address : ''}" placeholder="请输入详细地址"
                                   style="width: 100%; padding: 12px 16px; border: 2px solid rgba(212, 175, 55, 0.2); border-radius: 12px; font-size: 0.95rem; transition: all 0.3s ease;">
                        </div>
                        
                        <div style="display: flex; gap: 15px;">
                            <button type="submit" class="btn-action btn-primary">
                                <i class="bi bi-save"></i>
                                保存修改
                            </button>
                            <button type="button" class="btn-action btn-outline" onclick="window.location.reload()">
                                <i class="bi bi-x"></i>
                                取消
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 修改密码卡片 -->
    <div class="data-table">
        <div class="data-table-header">
            <h5>
                <i class="bi bi-shield-lock"></i>
                修改密码
            </h5>
        </div>
        
        <div style="padding: 30px;">
            <form th:action="@{/user/profile/change-password}" method="post">
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px;">
                    <div>
                        <label style="font-weight: 600; color: var(--text-primary); margin-bottom: 10px; display: block;">当前密码</label>
                        <input type="password" name="currentPassword" required placeholder="请输入当前密码"
                               style="width: 100%; padding: 12px 16px; border: 2px solid rgba(212, 175, 55, 0.2); border-radius: 12px; font-size: 0.95rem; transition: all 0.3s ease;">
                    </div>
                    <div>
                        <label style="font-weight: 600; color: var(--text-primary); margin-bottom: 10px; display: block;">新密码</label>
                        <input type="password" name="newPassword" required placeholder="请输入新密码"
                               style="width: 100%; padding: 12px 16px; border: 2px solid rgba(212, 175, 55, 0.2); border-radius: 12px; font-size: 0.95rem; transition: all 0.3s ease;">
                    </div>
                    <div>
                        <label style="font-weight: 600; color: var(--text-primary); margin-bottom: 10px; display: block;">确认新密码</label>
                        <input type="password" name="confirmPassword" required placeholder="请再次输入新密码"
                               style="width: 100%; padding: 12px 16px; border: 2px solid rgba(212, 175, 55, 0.2); border-radius: 12px; font-size: 0.95rem; transition: all 0.3s ease;">
                    </div>
                </div>
                <button type="submit" class="btn-action btn-primary">
                    <i class="bi bi-key"></i>
                    修改密码
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
