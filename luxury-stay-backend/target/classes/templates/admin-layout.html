<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle ?: '管理员后台'} + ' - Luxury Stay'">管理员后台 - Luxury Stay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 290px;
            --gold-primary: #c9a962;
            --gold-dark: #a68a42;
            --gold-light: #e8d498;
            --gold-gradient: linear-gradient(135deg, #b8944d 0%, #d4af37 40%, #f4d03f 55%, #d4af37 70%, #b8944d 100%);
            --gold-gradient-shine: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            --bg-dark: #0a0a12;
            --bg-darker: #050508;
            --bg-card: #ffffff;
            --bg-content: #f5f5f7;
            --text-white: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #5c5c70;
            --text-muted: #8a8a9a;
            --border-gold: rgba(212, 175, 55, 0.25);
            --border-light: rgba(0, 0, 0, 0.06);
            --shadow-gold: 0 10px 40px rgba(212, 175, 55, 0.2);
            --shadow-dark: 0 4px 25px rgba(0, 0, 0, 0.08);
            --shadow-card: 0 2px 15px rgba(0, 0, 0, 0.05);
            --transition-normal: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-content);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: linear-gradient(180deg, var(--bg-dark) 0%, var(--bg-darker) 100%);
            color: var(--text-white);
            z-index: 1000;
            overflow-y: auto;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 8px 0 40px rgba(0, 0, 0, 0.3);
            border-right: 1px solid var(--border-gold);
        }

        .sidebar-header {
            padding: 40px 28px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.12) 0%, rgba(212, 175, 55, 0.03) 100%);
            border-bottom: 1px solid var(--border-gold);
            position: relative;
            overflow: hidden;
        }

        .sidebar-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 100%;
            background: var(--gold-gradient-shine);
            animation: shine 4s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            50%, 100% { left: 100%; }
        }

        .sidebar-header h4 {
            margin: 0;
            font-family: 'Playfair Display', 'Noto Serif SC', Georgia, serif;
            font-weight: 700;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--gold-primary);
            letter-spacing: 3px;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
        }

        .sidebar-header h4 i {
            font-size: 1.8rem;
            color: var(--gold-primary);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .sidebar-header small {
            display: block;
            margin-top: 10px;
            opacity: 0.65;
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.55);
            letter-spacing: 2px;
            font-weight: 400;
            position: relative;
            z-index: 1;
            text-transform: uppercase;
        }

        .sidebar-nav {
            padding: 30px 0;
        }

        .nav-section-title {
            padding: 20px 28px 12px;
            font-size: 0.68rem;
            text-transform: uppercase;
            color: var(--gold-primary);
            letter-spacing: 2.5px;
            font-weight: 600;
            opacity: 0.75;
        }

        .nav-item {
            margin: 4px 18px;
        }

        .sidebar-nav .nav-link {
            color: rgba(255, 255, 255, 0.8) !important;
            padding: 18px 24px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: var(--transition-normal);
            font-size: 0.95rem;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            font-weight: 500;
            letter-spacing: 0.3px;
            background: transparent !important;
            border: none !important;
        }

        .sidebar-nav .nav-link::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 0;
            background: var(--gold-gradient);
            border-radius: 0 4px 4px 0;
            transition: height 0.35s ease;
        }

        .sidebar-nav .nav-link:hover {
            background: rgba(212, 175, 55, 0.1) !important;
            color: var(--gold-primary) !important;
            transform: translateX(6px);
        }

        .sidebar-nav .nav-link:hover::before {
            height: 60%;
        }

        .sidebar-nav .nav-link.active {
            background: var(--gold-gradient) !important;
            color: var(--bg-dark) !important;
            box-shadow: var(--shadow-gold);
            font-weight: 600;
        }

        .sidebar-nav .nav-link.active::before {
            height: 60%;
            background: transparent;
        }

        .sidebar-nav .nav-link i {
            font-size: 1.4rem;
            width: 30px;
            text-align: center;
            flex-shrink: 0;
        }

        .sidebar-nav .nav-link .badge {
            margin-left: auto;
            font-size: 0.68rem;
            padding: 5px 12px;
            border-radius: 14px;
            background: var(--gold-gradient);
            color: var(--bg-dark);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            transition: margin-left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .topbar {
            background: var(--bg-card);
            padding: 24px 40px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border-light);
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 28px;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.8rem;
            color: var(--gold-primary);
            cursor: pointer;
            padding: 12px;
            border-radius: 12px;
            transition: background 0.25s ease;
        }

        .menu-toggle:hover {
            background: rgba(212, 175, 55, 0.08);
        }

        .page-title {
            font-family: 'Playfair Display', 'Noto Serif SC', Georgia, serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 16px;
            letter-spacing: -0.5px;
        }

        .page-title i {
            color: var(--gold-primary);
            font-size: 1.6rem;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 28px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 22px;
            background: var(--gold-gradient);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-gold);
        }

        .user-info:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.3);
        }

        .user-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold-primary);
            font-weight: 700;
            font-size: 1.25rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.2);
        }

        .user-details {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-weight: 700;
            color: var(--bg-dark);
            font-size: 1.05rem;
            letter-spacing: 0.3px;
        }

        .user-role {
            font-size: 0.8rem;
            color: rgba(10, 10, 18, 0.65);
            font-weight: 500;
        }

        .content-area {
            padding: 40px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 32px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-card);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border-light);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: var(--gold-gradient);
        }

        .stat-card:hover {
            transform: translateY(-12px);
            box-shadow: var(--shadow-gold);
            border-color: var(--border-gold);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .stat-icon {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            transition: transform 0.35s ease;
            background: var(--gold-gradient);
            color: var(--bg-dark);
            box-shadow: var(--shadow-gold);
        }

        .stat-card:hover .stat-icon {
            transform: scale(1.18) rotate(8deg);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.92rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-family: 'Inter', sans-serif;
            font-size: 3.2rem;
            font-weight: 900;
            color: var(--text-primary);
            margin-bottom: 12px;
            line-height: 1.1;
            letter-spacing: -1px;
        }

        .stat-change {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            padding: 8px 16px;
            border-radius: 22px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .stat-change.positive {
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold-dark);
        }

        .stat-change.negative {
            background: rgba(239, 68, 68, 0.08);
            color: #dc2626;
        }

        .data-table {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-light);
        }

        .data-table:hover {
            border-color: var(--border-gold);
        }

        .data-table-header {
            padding: 28px 32px;
            background: var(--gold-gradient);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .data-table-header h5 {
            margin: 0;
            font-family: 'Playfair Display', 'Noto Serif SC', Georgia, serif;
            font-weight: 700;
            color: var(--bg-dark);
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 1.25rem;
            letter-spacing: 0.5px;
        }

        .data-table-header h5 i {
            font-size: 1.4rem;
        }

        .table-actions {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .search-filter {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(10, 10, 18, 0.06);
            padding: 12px 20px;
            border-radius: 14px;
            border: 1px solid rgba(212, 175, 55, 0.15);
        }

        .search-filter select {
            border: none;
            background: transparent;
            font-size: 0.9rem;
            color: var(--bg-dark);
            cursor: pointer;
            outline: none;
            min-width: 140px;
            font-weight: 500;
        }

        .search-filter select option {
            background: white;
            color: var(--text-primary);
        }

        .data-table thead {
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-darker) 100%);
            color: var(--gold-primary);
        }

        .data-table thead th {
            font-weight: 600;
            padding: 22px 28px;
            border: none;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            white-space: nowrap;
            font-family: 'Inter', sans-serif;
        }

        .data-table tbody td {
            padding: 20px 28px;
            vertical-align: middle;
            border-color: var(--border-light);
            transition: background 0.25s ease;
            font-size: 0.92rem;
            color: var(--text-primary);
        }

        .data-table tbody tr:hover td {
            background: rgba(212, 175, 55, 0.04);
        }

        .data-table tbody tr:nth-child(even) {
            background: rgba(0, 0, 0, 0.02);
        }

        .btn-action {
            padding: 11px 20px;
            border-radius: 14px;
            font-size: 0.88rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 0.3px;
        }

        .btn-action:hover {
            transform: translateY(-3px);
            text-decoration: none;
        }

        .btn-action:active {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--gold-gradient);
            color: var(--bg-dark);
            box-shadow: var(--shadow-gold);
        }

        .btn-primary:hover {
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.4);
            color: var(--bg-dark);
        }

        .btn-success {
            background: linear-gradient(135deg, #16a34a 0%, #22c55e 50%, #16a34a 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }

        .btn-success:hover {
            box-shadow: 0 10px 30px rgba(34, 197, 94, 0.4);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #dc2626 0%, #ef4444 50%, #dc2626 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.4);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, #ea580c 0%, #f97316 50%, #ea580c 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
        }

        .btn-warning:hover {
            box-shadow: 0 10px 30px rgba(249, 115, 22, 0.4);
            color: white;
        }

        .btn-info {
            background: linear-gradient(135deg, #0891b2 0%, #06b6d4 50%, #0891b2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
        }

        .btn-info:hover {
            box-shadow: 0 10px 30px rgba(6, 182, 212, 0.4);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border-gold);
            color: var(--gold-primary);
        }

        .btn-outline:hover {
            background: var(--gold-gradient);
            color: var(--bg-dark);
            border-color: transparent;
            box-shadow: var(--shadow-gold);
        }

        .status-badge {
            padding: 9px 20px;
            border-radius: 28px;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .status-pending {
            background: rgba(212, 175, 55, 0.12);
            color: var(--gold-dark);
        }

        .status-confirmed {
            background: rgba(34, 197, 94, 0.12);
            color: #15803d;
        }

        .status-completed {
            background: rgba(59, 130, 246, 0.12);
            color: #1d4ed8;
        }

        .status-cancelled {
            background: rgba(239, 68, 68, 0.12);
            color: #b91c1c;
        }

        .status-processing {
            background: rgba(212, 175, 55, 0.12);
            color: var(--gold-dark);
        }

        .status-resolved {
            background: rgba(34, 197, 94, 0.12);
            color: #15803d;
        }

        .empty-state {
            text-align: center;
            padding: 100px 40px;
        }

        .empty-state i {
            font-size: 5.5rem;
            color: var(--gold-primary);
            opacity: 0.25;
            margin-bottom: 30px;
        }

        .empty-state h5 {
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 15px;
            font-size: 1.25rem;
            font-family: 'Noto Serif SC', serif;
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .alert {
            padding: 20px 28px;
            border-radius: 18px;
            border-left: 6px solid;
            margin-bottom: 30px;
            display: flex;
            align-items: flex-start;
            gap: 16px;
            font-size: 0.95rem;
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.08);
            border-color: #22c55e;
            color: #15803d;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.08);
            border-color: #ef4444;
            color: #b91c1c;
        }

        .alert-info {
            background: rgba(212, 175, 55, 0.08);
            border-color: var(--gold-primary);
            color: var(--gold-dark);
        }

        @media (max-width: 992px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
            }

            .menu-toggle {
                display: block;
            }

            .topbar {
                padding: 18px 25px;
            }

            .content-area {
                padding: 25px;
            }

            .page-title {
                font-size: 1.4rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
                gap: 24px;
            }

            .stat-value {
                font-size: 2.5rem;
            }

            .topbar-right {
                gap: 15px;
            }

            .user-info {
                padding: 10px 16px;
            }

            .user-avatar {
                width: 44px;
                height: 44px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h4>
                <i class="bi bi-shield-lock"></i>
                Luxury Stay
            </h4>
            <small>管理员后台</small>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section-title">概览</div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a th:href="@{/admin}" class="nav-link" th:classappend="${activePage == 'dashboard' ? 'active' : ''}">
                        <i class="bi bi-speedometer2"></i>
                        <span>数据概览</span>
                    </a>
                </li>
            </ul>

            <div class="nav-section-title">酒店管理</div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a th:href="@{/admin/hotels}" class="nav-link" th:classappend="${activePage == 'hotels' ? 'active' : ''}">
                        <i class="bi bi-building"></i>
                        <span>酒店列表</span>
                    </a>
                </li>
            </ul>

            <div class="nav-section-title">评论管理</div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a th:href="@{/admin/reviews}" class="nav-link" th:classappend="${activePage == 'reviews' ? 'active' : ''}">
                        <i class="bi bi-chat-dots"></i>
                        <span>评论管理</span>
                        <span class="badge" th:if="${pendingReviews > 0}" th:text="${pendingReviews}">5</span>
                    </a>
                </li>
            </ul>

            <div class="nav-section-title">纠纷管理</div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a th:href="@{/admin/disputes}" class="nav-link" th:classappend="${activePage == 'disputes' ? 'active' : ''}">
                        <i class="bi bi-exclamation-triangle"></i>
                        <span>纠纷处理</span>
                        <span class="badge" th:if="${pendingDisputes > 0}" th:text="${pendingDisputes}">2</span>
                    </a>
                </li>
            </ul>

            <div class="nav-section-title">用户管理</div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a th:href="@{/admin/users}" class="nav-link" th:classappend="${activePage == 'users' ? 'active' : ''}">
                        <i class="bi bi-people"></i>
                        <span>用户列表</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/admin/businesses}" class="nav-link" th:classappend="${activePage == 'businesses' ? 'active' : ''}">
                        <i class="bi bi-building"></i>
                        <span>商家列表</span>
                    </a>
                </li>
            </ul>

            <div class="nav-section-title">设置</div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a th:href="@{/}" class="nav-link">
                        <i class="bi bi-house-door"></i>
                        <span>返回首页</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/auth/logout}" class="nav-link">
                        <i class="bi bi-box-arrow-right"></i>
                        <span>退出登录</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <main class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-toggle" onclick="toggleSidebar()">
                    <i class="bi bi-list"></i>
                </button>
                <h1 class="page-title">
                    <i class="bi" th:classappend="${pageIcon ?: 'bi-speedometer2'}"></i>
                    <span th:text="${pageTitle ?: '数据概览'}">数据概览</span>
                </h1>
            </div>

            <div class="topbar-right">
                <div class="user-info">
                    <div class="user-avatar">A</div>
                    <div class="user-details">
                        <span class="user-name">管理员</span>
                        <span class="user-role">系统管理员</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="content-area">
            <div th:if="${success}">
                <div class="alert alert-success">
                    <i class="bi bi-check-circle"></i>
                    <span th:text="${success}">操作成功</span>
                </div>
            </div>

            <div th:if="${error}">
                <div class="alert alert-error">
                    <i class="bi bi-exclamation-circle"></i>
                    <span th:text="${error}">操作失败</span>
                </div>
            </div>

            <div th:replace="~{${content} :: content}"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('active');
        }

        document.querySelector('.main-content').addEventListener('click', function() {
            if (window.innerWidth <= 992) {
                const sidebar = document.getElementById('sidebar');
                sidebar.classList.remove('active');
            }
        });
    </script>
</body>
</html>
