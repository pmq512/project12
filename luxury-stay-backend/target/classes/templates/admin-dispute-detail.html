<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>纠纷详情 - 管理员后台</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .font-serif {
            font-family: 'Playfair Display', 'Noto Serif SC', Georgia, serif;
        }
        .font-sans {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .evidence-image {
            max-width: 200px;
            max-height: 150px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .evidence-image:hover {
            transform: scale(1.05);
        }
        .chat-bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 16px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .chat-bubble.user {
            background-color: #f3f4f6;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        .chat-bubble.support {
            background-color: #e0e7ff;
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }
        .chat-time {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div th:fragment="content" class="font-sans">
            <div class="mb-6">
                <h2 class="h4 text-gray-800 font-semibold mb-2">纠纷详情</h2>
                <p class="text-gray-500 text-sm">纠纷编号: #D-<span th:text="${dispute.id}">0</span></p>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 space-y-6">
                    <div class="data-table">
                        <div class="data-table-header">
                            <h5><i class="bi bi-info-circle me-2"></i>纠纷信息</h5>
                        </div>
                        <div class="p-4">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label class="text-sm text-gray-500 mb-1 d-block">申请人类型</label>
                                    <span th:if="${dispute.applicantType.name() == 'USER'}" class="status-badge status-pending">用户</span>
                                    <span th:if="${dispute.applicantType.name() == 'BUSINESS'}" class="status-badge status-processing">商家</span>
                                </div>
                                <div>
                                    <label class="text-sm text-gray-500 mb-1 d-block">申请人ID</label>
                                    <p class="text-gray-800" th:text="${dispute.applicantId}">---</p>
                                </div>
                                <div>
                                    <label class="text-sm text-gray-500 mb-1 d-block">关联订单</label>
                                    <p class="text-gray-800">#O-<span th:text="${dispute.bookingId}">0</span></p>
                                </div>
                                <div>
                                    <label class="text-sm text-gray-500 mb-1 d-block">纠纷状态</label>
                                    <span th:if="${dispute.status.name() == 'PENDING'}" class="status-badge status-pending">待处理</span>
                                    <span th:if="${dispute.status.name() == 'PROCESSING'}" class="status-badge status-processing">处理中</span>
                                    <span th:if="${dispute.status.name() == 'RESOLVED'}" class="status-badge status-resolved">已解决</span>
                                    <span th:if="${dispute.status.name() == 'REJECTED'}" class="status-badge status-rejected">已驳回</span>
                                </div>
                                <div>
                                    <label class="text-sm text-gray-500 mb-1 d-block">申请时间</label>
                                    <p class="text-gray-800" th:text="${dispute.createdAt}">---</p>
                                </div>
                                <div th:if="${dispute.resolvedAt != null}">
                                    <label class="text-sm text-gray-500 mb-1 d-block">处理时间</label>
                                    <p class="text-gray-800" th:text="${dispute.resolvedAt}">---</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="data-table">
                        <div class="data-table-header">
                            <h5><i class="bi bi-file-text me-2"></i>纠纷原因</h5>
                        </div>
                        <div class="p-4">
                            <div class="mb-4">
                                <label class="text-sm text-gray-500 mb-1 d-block">原因描述</label>
                                <p class="text-gray-800" th:text="${dispute.reason}">---</p>
                            </div>
                            
                            <div th:if="${dispute.evidence != null}" class="mb-4">
                                <label class="text-sm text-gray-500 mb-1 d-block">证据材料</label>
                                <p class="text-gray-800" th:text="${dispute.evidence}">---</p>
                            </div>
                            
                            <div th:if="${dispute.adminNote != null}" class="mb-4">
                                <label class="text-sm text-gray-500 mb-1 d-block">处理备注</label>
                                <p class="text-gray-800" th:text="${dispute.adminNote}">---</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="data-table">
                        <div class="data-table-header">
                            <h5><i class="bi bi-images me-2"></i>证据图片</h5>
                        </div>
                        <div class="p-4">
                            <div th:if="${dispute.evidenceImages != null && !dispute.evidenceImages.isEmpty()}" class="flex flex-wrap gap-4">
                                <img th:each="img : ${#strings.split(dispute.evidenceImages, ',')}" 
                                     th:src="${img}" 
                                     th:alt="证据图片" 
                                     class="evidence-image">
                            </div>
                            <div th:if="${dispute.evidenceImages == null || dispute.evidenceImages.isEmpty()}" class="text-center text-gray-500 py-8">
                                <i class="bi bi-image-x text-4xl mb-2"></i>
                                <p>暂无证据图片</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="data-table">
                        <div class="data-table-header">
                            <h5><i class="bi bi-chat-dots me-2"></i>客服沟通记录</h5>
                        </div>
                        <div class="p-4">
                            <div th:if="${dispute.communicationRecords != null && !dispute.communicationRecords.isEmpty()}">
                                <div th:each="record : ${#strings.split(dispute.communicationRecords, '|||')}" 
                                     th:with="parts=${#strings.split(record, '---')}">
                                    <div th:if="${parts.size() >= 3}" 
                                         th:class="${parts[0] == 'USER' ? 'chat-bubble user' : 'chat-bubble support'}">
                                        <div th:text="${parts[2]}"></div>
                                        <div class="chat-time" th:text="${parts[1]}"></div>
                                    </div>
                                </div>
                            </div>
                            <div th:if="${dispute.communicationRecords == null || dispute.communicationRecords.isEmpty()}" class="text-center text-gray-500 py-8">
                                <i class="bi bi-chat-left-text text-4xl mb-2"></i>
                                <p>暂无沟通记录</p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="space-y-6">
                    <div class="data-table">
                        <div class="data-table-header">
                            <h5><i class="bi bi-calendar-check me-2"></i>关联订单信息</h5>
                        </div>
                        <div class="p-4">
                            <div th:if="${booking != null}" class="space-y-4">
                                <div class="flex justify-between items-center pb-2 border-b border-gray-100">
                                    <span class="text-sm text-gray-500">订单编号</span>
                                    <span class="text-gray-800 font-medium">#O-<span th:text="${booking.id}">0</span></span>
                                </div>
                                <div class="flex justify-between items-center pb-2 border-b border-gray-100">
                                    <span class="text-sm text-gray-500">用户ID</span>
                                    <span class="text-gray-800" th:text="${booking.userId}">---</span>
                                </div>
                                <div class="flex justify-between items-center pb-2 border-b border-gray-100">
                                    <span class="text-sm text-gray-500">酒店ID</span>
                                    <span class="text-gray-800" th:text="${booking.hotelId}">---</span>
                                </div>
                                <div class="flex justify-between items-center pb-2 border-b border-gray-100">
                                    <span class="text-sm text-gray-500">订单金额</span>
                                    <span class="text-gray-800 font-bold text-lg">¥<span th:text="${booking.totalPrice}">0</span></span>
                                </div>
                                <div class="flex justify-between items-center pb-2 border-b border-gray-100">
                                    <span class="text-sm text-gray-500">定金金额</span>
                                    <span class="text-gray-800">¥<span th:text="${booking.depositAmount}">0</span></span>
                                </div>
                                <div class="flex justify-between items-center pb-2 border-b border-gray-100">
                                    <span class="text-sm text-gray-500">平台抽成</span>
                                    <span class="text-gray-800">¥<span th:text="${booking.commissionAmount}">0</span></span>
                                </div>
                                <div class="flex justify-between items-center pb-2 border-b border-gray-100">
                                    <span class="text-sm text-gray-500">商家收入</span>
                                    <span class="text-gray-800">¥<span th:text="${booking.businessIncome}">0</span></span>
                                </div>
                                <div class="flex justify-between items-center pb-2 border-b border-gray-100">
                                    <span class="text-sm text-gray-500">入住日期</span>
                                    <span class="text-gray-800" th:text="${booking.checkIn}">---</span>
                                </div>
                                <div class="flex justify-between items-center pb-2 border-b border-gray-100">
                                    <span class="text-sm text-gray-500">离店日期</span>
                                    <span class="text-gray-800" th:text="${booking.checkOut}">---</span>
                                </div>
                                <div class="flex justify-between items-center pb-2 border-b border-gray-100">
                                    <span class="text-sm text-gray-500">房间类型</span>
                                    <span class="text-gray-800" th:text="${booking.roomType}">---</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-sm text-gray-500">订单状态</span>
                                    <span th:if="${booking.status.name() == 'PENDING'}" class="status-badge status-pending">待确认</span>
                                    <span th:if="${booking.status.name() == 'CONFIRMED'}" class="status-badge status-processing">已确认</span>
                                    <span th:if="${booking.status.name() == 'COMPLETED'}" class="status-badge status-resolved">已完成</span>
                                    <span th:if="${booking.status.name() == 'CANCELLED'}" class="status-badge status-rejected">已取消</span>
                                </div>
                            </div>
                            <div th:if="${booking == null}" class="text-center text-gray-500 py-4">
                                订单信息未找到
                            </div>
                        </div>
                    </div>
                    
                    <div class="data-table">
                        <div class="data-table-header">
                            <h5><i class="bi bi-tools me-2"></i>操作</h5>
                        </div>
                        <div class="p-4 space-y-3">
                            <a th:if="${dispute.status.name() == 'PENDING'}" th:href="@{/admin/disputes/{id}/process(id=${dispute.id})}" class="btn btn-warning btn-action w-full">
                                <i class="bi bi-hourglass"></i>开始处理
                            </a>
                            
                            <button th:if="${dispute.status.name() == 'PENDING' || dispute.status.name() == 'PROCESSING'}" class="btn btn-success btn-action w-full" data-bs-toggle="modal" data-bs-target="#resolveModal">
                                <i class="bi bi-check-circle"></i>解决纠纷
                            </button>
                            
                            <button th:if="${dispute.status.name() == 'PENDING' || dispute.status.name() == 'PROCESSING'}" class="btn btn-danger btn-action w-full" data-bs-toggle="modal" data-bs-target="#rejectModal">
                                <i class="bi bi-x-circle"></i>驳回申请
                            </button>
                            
                            <a th:href="@{/admin/disputes}" class="btn btn-action w-full" style="background: #f1f5f9; color: #1e293b;">
                                <i class="bi bi-arrow-left"></i>返回列表
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="modal fade" id="resolveModal" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">解决纠纷</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <form th:action="@{/admin/disputes/{id}/resolve(id=${dispute.id})}" method="get">
                                <div class="mb-3">
                                    <label class="form-label">处理备注</label>
                                    <textarea class="form-control" name="note" rows="3" placeholder="请输入处理备注..."></textarea>
                                </div>
                                <button type="submit" class="btn btn-success">确认解决</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="modal fade" id="rejectModal" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">驳回申请</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <form th:action="@{/admin/disputes/{id}/reject(id=${dispute.id})}" method="get">
                                <div class="mb-3">
                                    <label class="form-label">驳回原因</label>
                                    <textarea class="form-control" name="note" rows="3" placeholder="请输入驳回原因..."></textarea>
                                </div>
                                <button type="submit" class="btn btn-danger">确认驳回</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
    </div>
</body>
</html>
