<div th:fragment="content" class="font-sans">
    <div class="data-table">
        <div class="data-table-header">
            <h5>
                <i class="bi bi-heart"></i>
                我的收藏
            </h5>
        </div>
        
        <div th:if="${wishlist != null and !wishlist.empty}" style="padding: 25px;">
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
                <div th:each="hotel : ${wishlist}" style="background: white; border-radius: 16px; overflow: hidden; border: 1px solid rgba(212, 175, 55, 0.15); transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);">
                    <div style="position: relative;">
                        <img th:src="${hotel.image}" alt="${hotel.name}" style="width: 100%; height: 180px; object-fit: cover;">
                        <button th:onclick="'removeWishlist(' + ${hotel.id} + ')'" style="position: absolute; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.5); border: none; color: white; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s ease;">
                            <i class="bi bi-trash"></i>
                        </button>
                        <div style="position: absolute; bottom: 10px; left: 10px; background: var(--gold-primary); color: var(--bg-dark); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600;">
                            <i class="bi bi-star-fill"></i>
                            <span th:text="${hotel.rating}">4.8</span>
                        </div>
                    </div>
                    
                    <div style="padding: 20px;">
                        <h5 style="margin: 0 0 8px 0; font-weight: 700; color: var(--text-primary); font-size: 1.05rem;" th:text="${hotel.name}">豪华度假酒店</h5>
                        <p style="margin: 0 0 12px 0; color: var(--text-secondary); font-size: 0.9rem;" th:text="${hotel.location}">北京市朝阳区</p>
                        
                        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 15px;">
                            <div style="display: flex;">
                                <i th:each="i : ${#numbers.sequence(1,5)}" 
                                   class="bi bi-star-fill text-yellow-500" 
                                   th:classappend="${i <= hotel.star ? '' : 'text-gray-300'}"
                                   style="font-size: 0.8rem;"></i>
                            </div>
                            <span style="color: var(--text-secondary); font-size: 0.85rem;" th:text="${hotel.reviewCount + '条评论'}">128条评论</span>
                        </div>
                        
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <span style="font-size: 1.3rem; font-weight: 700; color: var(--gold-primary);" th:text="'¥' + ${hotel.price}">¥1,288</span>
                                <span style="color: var(--text-secondary); font-size: 0.85rem;">/晚</span>
                            </div>
                            <a th:href="@{/hotels/{id}(id=${hotel.id})}" class="btn-action btn-primary" style="padding: 8px 16px;">
                                <i class="bi bi-eye"></i>
                                查看详情
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div th:if="${wishlist == null or wishlist.empty}" class="empty-state">
            <i class="bi bi-heart"></i>
            <h5>暂无收藏</h5>
            <p>收藏喜欢的酒店，方便下次预订</p>
            <a th:href="@{/hotels}" class="btn-action btn-primary" style="margin-top: 20px;">
                <i class="bi bi-building"></i>
                浏览酒店
            </a>
        </div>
    </div>
    
    <script>
        function removeWishlist(hotelId) {
            if (confirm('确定要取消收藏吗？')) {
                window.location.href = '/user/wishlist/remove/' + hotelId;
            }
        }
    </script>
</div>
