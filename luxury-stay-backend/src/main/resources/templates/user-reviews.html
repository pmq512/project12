<div th:fragment="content" class="font-sans">
    <div class="data-table">
        <div class="data-table-header">
            <h5>
                <i class="bi bi-star"></i>
                我的评论
            </h5>
        </div>
        
        <div th:if="${reviews != null and !reviews.empty}" style="padding: 25px;">
            <div style="display: flex; flex-direction: column; gap: 20px;">
                <div th:each="review : ${reviews}" style="background: white; border-radius: 16px; padding: 25px; border: 1px solid rgba(212, 175, 55, 0.15); transition: all 0.3s ease;">
                    <div style="display: flex; gap: 20px;">
                        <div style="width: 150px; height: 120px; border-radius: 12px; overflow: hidden; flex-shrink: 0;">
                            <img th:src="${review.hotelImage}" alt="${review.hotelName}" style="width: 100%; height: 100%; object-fit: cover;">
                        </div>
                        
                        <div style="flex: 1;">
                            <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 15px;">
                                <div>
                                    <h5 style="margin: 0; font-weight: 700; color: var(--text-primary); font-size: 1.1rem;" th:text="${review.hotelName}">豪华度假酒店</h5>
                                    <div style="display: flex; gap: 4px; margin-top: 8px;">
                                        <i th:each="i : ${#numbers.sequence(1,5)}" 
                                           class="bi bi-star-fill" 
                                           th:classappend="${i <= review.rating ? 'text-yellow-500' : 'text-gray-300'}"
                                           style="font-size: 1rem;"></i>
                                    </div>
                                </div>
                                <span th:class="${review.status == 'APPROVED' ? 'badge bg-success' : 'badge bg-warning'}"
                                      th:text="${review.status == 'APPROVED' ? '已审核' : '待审核'}">已审核</span>
                            </div>
                            
                            <h6 style="margin: 0 0 10px 0; font-weight: 600; color: var(--text-primary);" th:text="${review.title}">非常满意</h6>
                            <p style="margin: 0 0 15px 0; color: var(--text-secondary); line-height: 1.6;" th:text="${review.content}">这是一次非常愉快的入住体验，服务很棒，房间很干净...</p>
                            
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span style="color: var(--text-secondary); font-size: 0.85rem;" th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-15 14:30</span>
                                <div style="display: flex; gap: 10px;">
                                    <button th:if="${review.status == 'APPROVED'}" class="btn-action btn-outline" th:onclick="'editReview(' + ${review.id} + ')'">
                                        <i class="bi bi-pencil"></i>
                                        编辑
                                    </button>
                                    <button class="btn-action btn-danger" th:onclick="'deleteReview(' + ${review.id} + ')'">
                                        <i class="bi bi-trash"></i>
                                        删除
                                    </button>
                                </div>
                            </div>
                            
                            <div th:if="${review.businessReply != null and !review.businessReply.empty}" style="margin-top: 15px; padding: 15px; background: rgba(212, 175, 55, 0.05); border-radius: 12px;">
                                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                                    <i class="bi bi-reply-fill" style="color: var(--gold-primary);"></i>
                                    <span style="font-weight: 600; color: var(--text-primary);">商家回复</span>
                                </div>
                                <p style="margin: 0; color: var(--text-secondary);" th:text="${review.businessReply}">感谢您的评价，期待您再次光临！</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div th:if="${reviews == null or reviews.empty}" class="empty-state">
            <i class="bi bi-star"></i>
            <h5>暂无评论</h5>
            <p>完成预订后可以对酒店进行评价</p>
            <a th:href="@{/hotels}" class="btn-action btn-primary" style="margin-top: 20px;">
                <i class="bi bi-building"></i>
                浏览酒店
            </a>
        </div>
    </div>
    
    <script>
        function editReview(reviewId) {
            window.location.href = '/reviews/edit/' + reviewId;
        }
        
        function deleteReview(reviewId) {
            if (confirm('确定要删除这条评论吗？')) {
                window.location.href = '/user/reviews/delete/' + reviewId;
            }
        }
    </script>
</div>
