<div th:fragment="content" class="font-sans">
    <!-- 消息提示 -->
    <div th:if="${error}" class="alert alert-danger">
        <i class="bi bi-exclamation-circle me-2"></i><span th:text="${error}"></span>
    </div>
    
    <div class="form-card">
        <h4 class="mb-4"><i class="bi bi-pencil me-2"></i>编辑酒店信息</h4>
        <form th:action="@{/business/hotels/{id}(id=${hotel.id})}" th:object="${hotelRequest}" method="post">
            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label">酒店名称 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{name}" placeholder="请输入酒店名称" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">位置 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{location}" placeholder="如：北京市朝阳区" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">星级 <span class="text-danger">*</span></label>
                    <select class="form-select" th:field="*{star}" required>
                        <option value="3" th:selected="${hotel.star == 3}">三星级</option>
                        <option value="4" th:selected="${hotel.star == 4}">四星级</option>
                        <option value="5" th:selected="${hotel.star == 5}">五星级</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">价格/晚 <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text">¥</span>
                        <input type="number" class="form-control" th:field="*{price}" placeholder="0" min="0" required>
                    </div>
                </div>
                <div class="col-12">
                    <label class="form-label">图片URL <span class="text-danger">*</span></label>
                    <input type="url" class="form-control" th:field="*{image}" placeholder="https://example.com/image.jpg" required>
                </div>
                <div class="col-12">
                    <label class="form-label">描述 <span class="text-danger">*</span></label>
                    <textarea class="form-control" th:field="*{description}" rows="3" placeholder="请输入酒店描述" required></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label">设施</label>
                    <input type="text" class="form-control" th:field="*{facilities}" placeholder="如：WiFi、游泳池、健身房">
                </div>
                <div class="col-md-6">
                    <label class="form-label">可用房间数 <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" th:field="*{roomsAvailable}" placeholder="0" min="0" required>
                </div>
            </div>
            
            <div class="d-flex gap-3 mt-4 pt-4 border-top">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle me-2"></i>保存修改
                </button>
                <a th:href="@{/business/hotels}" class="btn btn-secondary">
                    <i class="bi bi-x-circle me-2"></i>取消
                </a>
            </div>
        </form>
    </div>
</div>
