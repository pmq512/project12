<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>我的订单 - Luxury Stay</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .font-serif {
            font-family: 'Playfair Display', 'Noto Serif SC', Georgia, serif;
        }
        .font-sans {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .status-user-cancelled {
            background: rgba(156, 163, 175, 0.12);
            color: #6b7280;
        }
        .status-refunded {
            background: rgba(139, 92, 246, 0.12);
            color: #7c3aed;
        }
    </style>
</head>
<body>
<div th:fragment="content" class="font-sans">
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-header">
                <div class="stat-icon">
                    <i class="bi bi-calendar-check"></i>
                </div>
            </div>
            <p class="stat-label">全部订单</p>
            <div class="stat-value" th:text="${totalBookings}">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-header">
                <div class="stat-icon">
                    <i class="bi bi-clock"></i>
                </div>
            </div>
            <p class="stat-label">待处理订单</p>
            <div class="stat-value" th:text="${pendingBookings}">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-header">
                <div class="stat-icon">
                    <i class="bi bi-check-circle"></i>
                </div>
            </div>
            <p class="stat-label">已完成订单</p>
            <div class="stat-value" th:text="${completedBookings}">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-header">
                <div class="stat-icon">
                    <i class="bi bi-exclamation-triangle"></i>
                </div>
            </div>
            <p class="stat-label">纠纷订单</p>
            <div class="stat-value" th:text="${disputeBookings}">0</div>
        </div>
    </div>

    <div class="data-table">
        <div class="data-table-header">
            <h5>
                <i class="bi bi-list-ul"></i>
                我的订单
            </h5>
            <div class="table-actions">
                <div class="search-filter">
                    <i class="bi bi-filter"></i>
                    <select onchange="filterBookings(this.value)">
                        <option value="all">全部订单</option>
                        <option value="PENDING">待确认</option>
                        <option value="CONFIRMED">已确认</option>
                        <option value="COMPLETED">已完成</option>
                        <option value="CANCELLED">已取消</option>
                        <option value="DISPUTE">纠纷中</option>
                    </select>
                </div>
            </div>
        </div>

        <div th:if="${bookings != null and !bookings.empty}" style="padding: 25px;">
            <div th:each="booking : ${bookings}" class="booking-item" th:attr="data-status=${booking.status}" style="background: white; border-radius: 16px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(212, 175, 55, 0.15); transition: all 0.3s ease;">
                <div style="display: flex; gap: 20px;">
                    <div style="width: 200px; height: 150px; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);">
                        <img th:src="${booking.hotelImage}" alt="${booking.hotelName}" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <div style="flex: 1;">
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 15px;">
                            <div>
                                <h5 style="margin: 0; font-weight: 700; color: var(--text-primary); font-size: 1.1rem;" th:text="${booking.hotelName}">酒店名称</h5>
                                <p style="margin: 5px 0 0 0; color: var(--text-secondary); font-size: 0.9rem;" th:text="${booking.hotelLocation}">酒店地址</p>
                            </div>
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <span class="status-badge" th:class="${booking.status == 'PENDING' ? 'status-pending' : booking.status == 'CONFIRMED' ? 'status-confirmed' : booking.status == 'COMPLETED' ? 'status-completed' : booking.status == 'CANCELLED' ? 'status-cancelled' : booking.status == 'USER_CANCELLED' ? 'status-user-cancelled' : booking.status == 'DISPUTE' ? 'status-pending' : 'status-refunded'}"
                                      th:text="${booking.status == 'PENDING' ? '待确认' : booking.status == 'CONFIRMED' ? '已确认' : booking.status == 'COMPLETED' ? '已完成' : booking.status == 'CANCELLED' ? '已取消' : booking.status == 'USER_CANCELLED' ? '用户取消' : booking.status == 'DISPUTE' ? '纠纷中' : '已退款'}">状态</span>
                                <small style="color: var(--text-secondary); font-size: 0.85rem;" th:text="${#temporals.format(booking.createdAt, 'yyyy-MM-dd HH:mm')}">预订时间</small>
                            </div>
                        </div>
                        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 15px; background: rgba(212, 175, 55, 0.05); padding: 15px; border-radius: 12px;">
                            <div>
                                <p style="margin: 0; color: var(--text-secondary); font-size: 0.85rem;">订单编号</p>
                                <p style="margin: 5px 0 0 0; font-weight: 600; color: var(--text-primary); font-size: 0.95rem;" th:text="${booking.bookingNumber}">BK001</p>
                            </div>
                            <div>
                                <p style="margin: 0; color: var(--text-secondary); font-size: 0.85rem;">入住日期</p>
                                <p style="margin: 5px 0 0 0; font-weight: 600; color: var(--text-primary); font-size: 0.95rem;" th:text="${#temporals.format(booking.checkIn, 'yyyy-MM-dd')}">2024-01-15</p>
                            </div>
                            <div>
                                <p style="margin: 0; color: var(--text-secondary); font-size: 0.85rem;">退房日期</p>
                                <p style="margin: 5px 0 0 0; font-weight: 600; color: var(--text-primary); font-size: 0.95rem;" th:text="${#temporals.format(booking.checkOut, 'yyyy-MM-dd')}">2024-01-18</p>
                            </div>
                            <div>
                                <p style="margin: 0; color: var(--text-secondary); font-size: 0.85rem;">房型/人数</p>
                                <p style="margin: 5px 0 0 0; font-weight: 600; color: var(--text-primary); font-size: 0.95rem;" th:text="${booking.roomType + ' / ' + booking.guests + '人'}">豪华房/2人</p>
                            </div>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(212, 175, 55, 0.1); padding-top: 15px;">
                            <div>
                                <span style="color: var(--text-secondary); font-size: 0.9rem;">订单金额：</span>
                                <span style="font-size: 1.5rem; font-weight: 700; color: var(--gold-primary);" th:text="'¥' + ${booking.totalPrice}">¥4,750</span>
                            </div>
                            <div style="display: flex; gap: 10px;">
                                <a th:href="@{/user/bookings/detail/{id}(id=${booking.id})}" class="btn-action btn-primary">
                                    <i class="bi bi-eye"></i>
                                    查看详情
                                </a>
                                <button th:if="${booking.status == 'PENDING' or booking.status == 'CONFIRMED'}" class="btn-action btn-warning" th:onclick="'cancelBooking(' + ${booking.id} + ')'">
                                    <i class="bi bi-x-circle"></i>
                                    取消订单
                                </button>
                                <button th:if="${booking.status == 'CONFIRMED' or booking.status == 'PENDING'}" class="btn-action btn-info" th:onclick="'openChat(' + ${booking.id} + ',' + ${booking.hotelId} + ')'">
                                    <i class="bi bi-chat-dots"></i>
                                    联系商家
                                </button>
                                <button th:if="${booking.status == 'CONFIRMED' or booking.status == 'DISPUTE'}" class="btn-action btn-danger" th:onclick="'requestIntervention(' + ${booking.id} + ')'">
                                    <i class="bi bi-exclamation-triangle"></i>
                                    申请介入
                                </button>
                                <button th:if="${booking.status == 'COMPLETED'}" class="btn-action btn-success" th:onclick="'goToReview(' + ${booking.id} + ',' + ${booking.hotelId} + ')'">
                                    <i class="bi bi-star"></i>
                                    发表评价
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${bookings == null or bookings.empty}" class="empty-state">
            <i class="bi bi-calendar-x"></i>
            <h5>暂无订单记录</h5>
            <p>快去浏览酒店，开启您的奢华之旅吧！</p>
            <a th:href="@{/hotels}" class="btn-action btn-primary" style="margin-top: 20px;">
                <i class="bi bi-building"></i>
                浏览酒店
            </a>
        </div>
    </div>

    <div id="chatModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 9999;">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; max-width: 90%; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);">
            <div style="padding: 25px; border-bottom: 1px solid rgba(212, 175, 55, 0.2); display: flex; justify-content: space-between; align-items: center;">
                <h5 style="margin: 0; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 10px;">
                    <i class="bi bi-chat-dots" style="color: var(--gold-primary);"></i>
                    与商家沟通
                </h5>
                <button onclick="closeChat()" style="background: none; border: none; font-size: 1.5rem; color: var(--text-secondary); cursor: pointer;">
                    <i class="bi bi-x"></i>
                </button>
            </div>
            <div style="padding: 25px;">
                <div id="chatMessages" style="height: 300px; overflow-y: auto; padding: 15px; background: rgba(212, 175, 55, 0.05); border-radius: 12px; margin-bottom: 15px;">
                </div>
                <form id="chatForm" style="display: flex; gap: 10px;">
                    <input type="text" id="chatInput" placeholder="输入消息..." style="flex: 1; padding: 12px 16px; border: 2px solid rgba(212, 175, 55, 0.2); border-radius: 12px; font-size: 0.95rem;">
                    <button type="submit" class="btn-action btn-primary">
                        <i class="bi bi-send"></i>
                        发送
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div id="interventionModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 9999;">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 500px; max-width: 90%; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);">
            <div style="padding: 25px; border-bottom: 1px solid rgba(212, 175, 55, 0.2); display: flex; justify-content: space-between; align-items: center;">
                <h5 style="margin: 0; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 10px;">
                    <i class="bi bi-exclamation-triangle" style="color: #dc2626;"></i>
                    申请管理员介入
                </h5>
                <button onclick="closeIntervention()" style="background: none; border: none; font-size: 1.5rem; color: var(--text-secondary); cursor: pointer;">
                    <i class="bi bi-x"></i>
                </button>
            </div>
            <div style="padding: 25px;">
                <div class="alert alert-info" style="margin-bottom: 20px;">
                    <i class="bi bi-info-circle"></i>
                    <span>管理员将介入处理您与商家之间的订单纠纷，请详细描述问题。</span>
                </div>
                <form id="interventionForm" th:action="@{/user/disputes/create}" method="post">
                    <input type="hidden" name="bookingId" id="interventionBookingId">
                    <div style="margin-bottom: 20px;">
                        <label style="font-weight: 600; color: var(--text-primary); margin-bottom: 10px; display: block;">问题描述</label>
                        <textarea name="reason" placeholder="请详细描述您遇到的问题..." style="width: 100%; padding: 12px 16px; border: 2px solid rgba(212, 175, 55, 0.2); border-radius: 12px; font-size: 0.95rem; resize: vertical; min-height: 120px;" required></textarea>
                    </div>
                    <div style="display: flex; gap: 10px; justify-content: flex-end;">
                        <button type="button" class="btn-action btn-outline" onclick="closeIntervention()">取消</button>
                        <button type="submit" class="btn-action btn-danger">
                            <i class="bi bi-paper-plane"></i>
                            提交申请
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function filterBookings(status) {
            const bookings = document.querySelectorAll('.booking-item');
            bookings.forEach(booking => {
                const bookingStatus = booking.dataset.status;
                if (status === 'all') {
                    booking.style.display = 'block';
                } else {
                    booking.style.display = bookingStatus === status ? 'block' : 'none';
                }
            });
        }

        function cancelBooking(bookingId) {
            if (confirm('确定要取消此订单吗？取消后可能需要支付违约金。')) {
                window.location.href = '/user/bookings/cancel/' + bookingId;
            }
        }

        function openChat(bookingId, hotelId) {
            document.getElementById('chatModal').style.display = 'block';
            loadChatMessages(bookingId);
        }

        function closeChat() {
            document.getElementById('chatModal').style.display = 'none';
        }

        function loadChatMessages(bookingId) {
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--text-secondary);"><i class="bi bi-chat-dots" style="font-size: 2rem;"></i><p style="margin-top: 10px;">暂无聊天记录</p></div>';
        }

        document.getElementById('chatForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const message = document.getElementById('chatInput').value;
            if (message.trim()) {
                const chatMessages = document.getElementById('chatMessages');
                chatMessages.innerHTML += '<div style="margin-bottom: 10px; text-align: right;"><div style="background: var(--gold-gradient); color: var(--bg-dark); padding: 10px 15px; border-radius: 12px; display: inline-block;">' + message + '</div></div>';
                document.getElementById('chatInput').value = '';
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        });

        function requestIntervention(bookingId) {
            document.getElementById('interventionBookingId').value = bookingId;
            document.getElementById('interventionModal').style.display = 'block';
        }

        function closeIntervention() {
            document.getElementById('interventionModal').style.display = 'none';
        }

        function goToReview(bookingId, hotelId) {
            window.location.href = '/hotels/' + hotelId;
        }

        document.getElementById('chatModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeChat();
            }
        });

        document.getElementById('interventionModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeIntervention();
            }
        });
    </script>
</div>
</body>
</html>
