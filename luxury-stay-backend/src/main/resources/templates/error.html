<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错误 - LuxuryStay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #D4AF37;
            --secondary-gold: #F4E4BA;
            --dark-gold: #996515;
            --dark-bg: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: 'Inter', 'Noto Serif SC', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.1) 0%, transparent 50%),
                              radial-gradient(circle at 80% 50%, rgba(244, 228, 186, 0.1) 0%, transparent 50%);
        }

        .error-container {
            text-align: center;
            padding: 60px 40px;
            max-width: 600px;
        }

        .error-icon {
            font-size: 80px;
            color: var(--primary-gold);
            margin-bottom: 30px;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
        }

        .error-title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--primary-gold), var(--secondary-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .error-message {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .error-details {
            background: var(--card-bg);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }

        .error-details h5 {
            color: var(--primary-gold);
            margin-bottom: 15px;
            font-size: 16px;
        }

        .error-details p {
            color: var(--text-secondary);
            margin: 0;
            font-size: 14px;
            word-break: break-all;
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--primary-gold), var(--dark-gold));
            color: #000;
            border: none;
            padding: 12px 40px;
            border-radius: 25px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
            color: #000;
        }

        .btn-gold:active {
            transform: translateY(0);
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--primary-gold);
        }

        .back-link i {
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h1 class="error-title">出错了</h1>
        <p class="error-message">抱歉，系统遇到了一些问题。请稍后再试。</p>

        <div class="error-details" th:if="${error}">
            <h5>错误信息</h5>
            <p th:text="${error}">未知错误</p>
        </div>

        <div class="error-details" th:if="${errors}">
            <h5>详细信息</h5>
            <div th:each="entry : ${errors}">
                <p><strong th:text="${entry.key}"></strong>: <span th:text="${entry.value}"></span></p>
            </div>
        </div>

        <a href="/" class="btn-gold">
            <i class="fas fa-home"></i> 返回首页
        </a>

        <a href="javascript:history.back()" class="back-link">
            <i class="fas fa-arrow-left"></i> 返回上一页
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
