<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>商家详情 - Luxury Stay</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .font-serif {
            font-family: 'Playfair Display', 'Noto Serif SC', Georgia, serif;
        }
        .font-sans {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
    </style>
</head>
<body>
    <div th:fragment="content" class="font-sans">
            <div class="mb-4">
                <a href="/admin/businesses" class="btn-action btn-outline">
                    <i class="bi bi-arrow-left"></i>返回列表
                </a>
            </div>

            <div th:if="${business != null}" class="row">
                <div class="col-lg-4">
                    <div class="data-table">
                        <div class="data-table-header">
                            <h5><i class="bi bi-building"></i>基本信息</h5>
                        </div>
                        <div class="p-4">
                            <div class="text-center mb-4">
                                <div class="user-avatar mx-auto mb-3" style="width: 100px; height: 100px; font-size: 2.5rem; background: linear-gradient(135deg, #f97316, #ea580c);">
                                    <i class="bi bi-building"></i>
                                </div>
                                <h4 th:text="${business.username}" class="font-bold"></h4>
                                <span class="status-badge" th:class="${business.enabled ? 'status-resolved' : 'status-pending'}">
                                    <span th:text="${business.enabled ? '已通过审核' : '待审核'}"></span>
                                </span>
                            </div>

                            <div class="space-y-3">
                                <div class="flex justify-between">
                                    <span class="text-secondary">商家ID</span>
                                    <span class="font-semibold">#<span th:text="${business.id}"></span></span>
                                </div>
                                <div class="flex justify-between">
                                    <span class="text-secondary">联系人</span>
                                    <span th:text="${business.contactName} ?: '-'"></span>
                                </div>
                                <div class="flex justify-between">
                                    <span class="text-secondary">邮箱</span>
                                    <span th:text="${business.email} ?: '-'"></span>
                                </div>
                                <div class="flex justify-between">
                                    <span class="text-secondary">手机号</span>
                                    <span th:text="${business.phone} ?: '-'"></span>
                                </div>
                                <div class="flex justify-between">
                                    <span class="text-secondary">身份证号</span>
                                    <span th:text="${business.idCard} ?: '-'"></span>
                                </div>
                                <div class="flex justify-between">
                                    <span class="text-secondary">营业执照</span>
                                    <span th:if="${business.businessLicense != null}" class="text-success">
                                        <i class="bi bi-check-circle"></i>已上传
                                    </span>
                                    <span th:unless="${business.businessLicense != null}" class="text-warning">
                                        <i class="bi bi-x-circle"></i>未上传
                                    </span>
                                </div>
                                <div class="flex justify-between">
                                    <span class="text-secondary">注册时间</span>
                                    <span th:text="${business.createdAt}"></span>
                                </div>
                            </div>

                            <div class="mt-4 pt-4 border-top">
                                <div class="d-flex gap-2">
                                    <a th:if="${!business.enabled}" 
                                       th:href="@{/admin/businesses/{id}/approve(id=${business.id})}" 
                                       class="btn-action btn-success flex-1">
                                        <i class="bi bi-check-circle"></i>通过审核
                                    </a>
                                    <a th:if="${business.enabled}" 
                                       th:href="@{/admin/businesses/{id}/reject(id=${business.id})}" 
                                       class="btn-action btn-danger flex-1">
                                        <i class="bi bi-x-circle"></i>驳回审核
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-8">
                    <div class="data-table">
                        <div class="data-table-header">
                            <h5><i class="bi bi-hotel"></i>旗下酒店</h5>
                        </div>
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>酒店名称</th>
                                    <th>城市</th>
                                    <th>地址</th>
                                    <th>星级</th>
                                    <th>评分</th>
                                    <th>房间数</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="hotel : ${hotels}">
                                    <td th:text="${hotel.name}"></td>
                                    <td th:text="${hotel.city}"></td>
                                    <td th:text="${hotel.address}"></td>
                                    <td>
                                        <div class="flex gap-1">
                                            <i class="bi bi-star-fill text-yellow-500" th:each="i : ${#numbers.sequence(1, hotel.starRating)}"></i>
                                        </div>
                                    </td>
                                    <td>
                                        <div class="flex items-center gap-1">
                                            <i class="bi bi-star-fill text-yellow-500"></i>
                                            <span class="font-semibold" th:text="${hotel.rating}"></span>
                                        </div>
                                    </td>
                                    <td th:text="${hotel.roomCount}"></td>
                                </tr>
                                <tr th:if="${hotels.isEmpty()}">
                                    <td colspan="6" class="empty-state">
                                        <i class="bi bi-hotel"></i>
                                        <h5>暂无酒店</h5>
                                        <p>该商家还没有添加酒店</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div th:unless="${business != null}" class="empty-state">
                <i class="bi bi-exclamation-circle"></i>
                <h5>商家不存在</h5>
                <p>未找到指定的商家信息</p>
            </div>
    </div>
</body>
</html>
